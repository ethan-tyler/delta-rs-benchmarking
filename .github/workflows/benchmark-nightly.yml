name: Benchmark Nightly

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    runs-on: [self-hosted, delta-bench]
    timeout-minutes: 240
    concurrency:
      group: delta-bench-nightly
      cancel-in-progress: false
    env:
      DELTA_BENCH_EGRESS_POLICY_SHA256: ${{ vars.DELTA_BENCH_EGRESS_POLICY_SHA256 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce runner security preflight
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/security_check.sh --enforce-run-mode --require-no-public-ipv4 --require-egress-policy

      - name: Prepare benchmark workspace
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/prepare_delta_rs.sh
          ./scripts/sync_harness_to_delta_rs.sh

      - name: Run nightly local benchmark
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/bench.sh data --dataset-id medium_selective --seed 42
          ./scripts/bench.sh run --dataset-id medium_selective --suite scan --runner all --lane macro --warmup 1 --iters 3 --label nightly-local

      - name: Resolve nightly remote candidate pack
        shell: bash
        run: |
          set -euo pipefail
          env PYTHONPATH="${GITHUB_WORKSPACE}/python" python3 -m delta_bench_compare.pack plan \
            --registry bench/evidence/registry.yaml \
            --pack s3-candidate-manual \
            --base-sha "${GITHUB_SHA}" \
            --candidate-sha "${GITHUB_SHA}" \
            --output nightly-s3-pack-plan.json

      - name: Run nightly remote candidate pack
        shell: bash
        env:
          BENCH_STORAGE_OPTIONS: ${{ vars.BENCH_STORAGE_OPTIONS }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          payload = json.loads(Path("nightly-s3-pack-plan.json").read_text(encoding="utf-8"))
          storage_args = []
          for opt in os.environ.get("BENCH_STORAGE_OPTIONS", "").splitlines():
              if not opt:
                  continue
              storage_args.extend(["--storage-option", opt])
          failures = []
          for shard in payload["include"]:
              surface = shard.get("surface") or shard["suite"]
              suite = shard["suite"]
              profile = shard["profile"]
              timeout_minutes = int(shard["timeout_minutes"])
              command = [
                  "./scripts/run_profile.sh",
                  "--base-sha",
                  os.environ["GITHUB_SHA"],
                  "--candidate-sha",
                  os.environ["GITHUB_SHA"],
                  profile,
              ]
              command.extend(storage_args)
              if shard.get("storage_backend"):
                  command.extend(["--storage-backend", shard["storage_backend"]])
              if shard.get("backend_profile"):
                  command.extend(["--backend-profile", shard["backend_profile"]])
              print(f"==> running {surface} ({suite} via {profile})")
              try:
                  completed = subprocess.run(
                      command,
                      check=False,
                      timeout=timeout_minutes * 60,
                  )
              except subprocess.TimeoutExpired:
                  failures.append(f"{surface}: timed out after {timeout_minutes} minutes")
                  continue
              if completed.returncode != 0:
                  failures.append(f"{surface}: exit {completed.returncode}")

          if failures:
              raise SystemExit(
                  "nightly remote candidate pack failures:\n- "
                  + "\n- ".join(failures)
              )
          PY

      - name: Upload nightly benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-results
          path: |
            nightly-s3-pack-plan.json
            results/
          if-no-files-found: warn
